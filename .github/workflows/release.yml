name: Deploy to Cloud Run on Tag Push

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Google Cloud. Provide the service account JSON as the
      # GCP_SERVICE_ACCOUNT secret (needs Cloud Run Admin + Service Account User,
      # and Cloud Build / Artifact Registry access for --source builds).
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Cloud Build builds the repo-root Dockerfile (multi-stage Go build),
      # pushes the image, and deploys it. Cloud Run injects PORT, which the
      # Go server must read (os.Getenv("PORT")).
      # Set GCP_PROJECT and GCP_REGION as repository variables.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agent-server \
            --source . \
            --project "${{ vars.GCP_PROJECT }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --quiet